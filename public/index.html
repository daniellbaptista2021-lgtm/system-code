<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>System Code</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" href="/favicon.png">
<meta name="theme-color" content="#1c1b18">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#1c1b18;color:#d4d0c8;height:100vh;display:flex;align-items:center;justify-content:center;-webkit-font-smoothing:antialiased}
.card{width:92%;max-width:380px;animation:up .4s ease}
.logo{display:flex;align-items:center;justify-content:center;margin-bottom:36px}
.logo img{height:48px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:500;color:#9b9586;margin-bottom:6px}
.field input{width:100%;padding:12px 14px;border:1px solid #3a3630;border-radius:10px;background:#292521;color:#d4d0c8;font-size:15px;font-family:inherit;outline:none;transition:border-color .2s}
.field input:focus{border-color:#c96442}
.field input::placeholder{color:#6b6560}
.btn{width:100%;padding:13px;border:none;border-radius:10px;background:#d4d0c8;color:#1c1b18;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:6px;transition:opacity .15s}
.btn:hover{opacity:.85}
.btn:active{transform:scale(.98)}
.btn:disabled{opacity:.3;cursor:not-allowed}
.err{color:#ef4444;font-size:13px;text-align:center;margin-top:14px;display:none}
.sub{text-align:center;margin-top:20px;font-size:12px;color:#524e48}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="/logo.png" alt="System Code">
  </div>
  <form id="f">
    <div class="field">
      <label>Usuario</label>
      <input type="text" id="u" placeholder="Seu usuario" required autofocus autocomplete="username">
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" id="p" placeholder="Sua senha" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn" id="b">Entrar</button>
  </form>
  <p class="err" id="e"></p>
  <p class="sub">System Code &middot; Assistente IA</p>
</div>
<script>
if(localStorage.getItem('claude_token'))location.href='/chat.html';
document.getElementById('f').onsubmit=async e=>{
  e.preventDefault();
  const b=document.getElementById('b'),err=document.getElementById('e');
  err.style.display='none';b.disabled=true;b.textContent='Entrando...';
  try{
    const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:document.getElementById('u').value,password:document.getElementById('p').value})});
    const d=await r.json();
    if(d.ok){localStorage.setItem('claude_token',d.token);location.href='/chat.html';}
    else{err.textContent=d.error||'Credenciais invalidas';err.style.display='block';}
  }catch{err.textContent='Erro de conexao';err.style.display='block';}
  b.disabled=false;b.textContent='Entrar';
};
</script>
</body>
</html>
