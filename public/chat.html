<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f5f0e8">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" href="/favicon.png">
<title>System Code</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:transparent;
  --bg-sidebar:rgba(240,232,218,0.88);
  --bg-sidebar-hover:rgba(232,222,206,0.92);
  --bg-sidebar-active:rgba(222,210,193,0.95);
  --bg-input:rgba(255,255,255,0.62);
  --bg-code:rgba(238,230,218,0.85);
  --bg-code-header:rgba(228,220,206,0.9);
  --bg-hover:rgba(60,30,10,0.06);
  --bg-user-msg:rgba(201,100,66,0.07);
  --text:#3d1f0e;
  --text-secondary:#6b4535;
  --text-muted:#8a6a58;
  --text-faint:#b09078;
  --border:rgba(175,135,108,0.28);
  --border-subtle:rgba(175,135,108,0.16);
  --accent:#c96442;
  --accent-light:#d97a5a;
  --accent-dim:#a8523a;
  --green:#3d8c38;
  --purple:#6c5ce7;
  --scrollbar:rgba(175,135,108,0.25);
  --scrollbar-hover:rgba(175,135,108,0.45);
  --shadow:0 4px 12px rgba(0,0,0,.08);
  --shadow-lg:0 8px 30px rgba(0,0,0,.12);
  --radius-sm:8px;
  --radius-md:12px;
  --radius-lg:20px;
  --radius-xl:26px;
  --transition:0.15s ease;
  --font:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  --font-serif:'DM Sans',-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
html,body{
  height:100%;
  font-family:var(--font);
  background:
    radial-gradient(ellipse at -8% -8%, rgba(210,122,100,0.62) 0%, transparent 44%),
    radial-gradient(ellipse at 108% -6%, rgba(208,132,112,0.52) 0%, transparent 42%),
    radial-gradient(ellipse at 8% 68%, rgba(222,162,90,0.46) 0%, transparent 48%),
    radial-gradient(ellipse at 88% 88%, rgba(215,152,132,0.58) 0%, transparent 42%),
    radial-gradient(ellipse at 50% 48%, rgba(238,228,155,0.42) 0%, transparent 54%),
    #f5f0e8;
  background-attachment:fixed;
  color:var(--text);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  -moz-osx-font-smoothing:grayscale;
  text-rendering:optimizeLegibility}
#app{display:flex;height:100%}

/* ═══════ SIDEBAR — removida ═══════ */
.btn-new-chat{width:34px;height:34px;border-radius:var(--radius-sm);background:transparent;border:none;color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all var(--transition);-webkit-tap-highlight-color:transparent;touch-action:manipulation;user-select:none;-webkit-user-select:none}
.btn-new-chat:hover{color:var(--text);background:var(--bg-hover)}
.btn-new-chat:active{opacity:.6}
.btn-logout{background:none;border:none;color:var(--text-faint);cursor:pointer;font-size:15px;transition:color var(--transition);-webkit-tap-highlight-color:transparent}
.btn-logout:hover{color:#ef4444}

/* ═══════ MAIN ═══════ */
.main{flex:1;display:flex;flex-direction:column;min-width:0;position:relative}

/* Header */
.header{height:52px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;border-bottom:1px solid rgba(175,135,108,0.18);flex-shrink:0;background:rgba(245,240,232,0.6);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px)}
.header-left{display:flex;align-items:center;gap:10px}
.model-badge{display:flex;align-items:center;gap:7px;font-size:14px;font-weight:500;color:var(--text)}
.model-badge .dot{width:7px;height:7px;border-radius:50%;transition:background .3s}
.dot.online{background:var(--green);box-shadow:0 0 6px rgba(91,168,85,.35)}
.dot.offline{background:#ef4444;box-shadow:0 0 6px rgba(239,68,68,.35)}
.dot.loading{background:#f59e0b;animation:pulse-dot 1.5s infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.4}}
.header-right{display:flex;gap:8px;align-items:center}
.pro-badge{font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--accent);background:rgba(201,100,66,.12);padding:4px 10px;border-radius:6px;border:1px solid rgba(201,100,66,.2)}

/* Usage bar (Melhoria 6) */
.usage-bar{display:none;align-items:center;gap:10px;font-size:11px;color:var(--text-muted)}
.usage-bar span{display:flex;align-items:center;gap:3px}

/* ═══════ MESSAGES ═══════ */
.messages-wrap{flex:1;overflow-y:auto;overflow-x:hidden;background:transparent}
.messages-wrap::-webkit-scrollbar{width:5px}
.messages-wrap::-webkit-scrollbar-track{background:transparent}
.messages-wrap::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:3px}
.messages-wrap::-webkit-scrollbar-thumb:hover{background:var(--scrollbar-hover)}

.messages-inner{max-width:720px;width:100%;margin:0 auto;padding:24px 24px 12px}

/* Welcome */
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:55vh;animation:fadeUp .5s ease}
.welcome-icon{display:flex;align-items:center;justify-content:center;margin-bottom:22px}
.welcome-icon img{height:72px;max-width:calc(100vw - 48px);object-fit:contain}
.welcome h2{font-size:26px;font-weight:700;color:var(--text);margin-bottom:8px;letter-spacing:-.02em;font-family:var(--font)}
.welcome p{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--text-muted);max-width:420px;text-align:center;line-height:1.65;font-family:var(--font)}

/* Message */
.message{opacity:0;animation:msgIn .35s ease forwards;margin-bottom:2px}
.msg-row{display:flex;gap:12px;padding:14px 0;position:relative}
.msg-row.user{flex-direction:row-reverse}

.msg-avatar{width:38px;height:38px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;margin-top:2px}
.msg-avatar.ai{background:transparent}
.msg-avatar.ai img{width:38px;height:38px;border-radius:50%;object-fit:contain}
.msg-avatar.human{background:var(--accent);color:#fff}
.msg-avatar.tg{background:#38bdf8;color:#fff}

.msg-body{max-width:calc(100% - 46px);min-width:0;flex:1}
.msg-meta{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.msg-row.user .msg-meta{flex-direction:row-reverse}
.msg-name{font-size:13px;font-weight:600;color:var(--text);font-family:var(--font)}
.msg-source{font-size:10px;color:var(--text-faint);background:var(--bg-input);padding:1px 7px;border-radius:4px;font-weight:500;letter-spacing:.03em;text-transform:uppercase}
.msg-time{font-size:11px;color:var(--text-faint)}

/* Bot text */
.msg-text{font-size:15.5px;line-height:1.65;color:var(--text);word-break:break-word;font-family:var(--font-serif)}
.msg-row.user .msg-text{text-align:right;color:var(--text-secondary);font-family:var(--font);font-size:14.5px;line-height:1.6}

/* Message actions */
.msg-actions{display:flex;gap:2px;margin-top:6px;opacity:0;transition:opacity .2s}
.msg-row:hover .msg-actions{opacity:1}
.msg-row.user .msg-actions{justify-content:flex-end}
.msg-act{width:30px;height:30px;border-radius:6px;background:none;border:none;color:var(--text-faint);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all var(--transition)}
.msg-act:hover{background:var(--bg-hover);color:var(--text-secondary)}
.msg-act.copied{color:var(--green)!important}

/* Markdown */
.msg-text p{margin-bottom:10px}
.msg-text p:last-child{margin-bottom:0}
.msg-text strong{font-weight:600;color:var(--text)}
.msg-text em{color:var(--text-secondary);font-style:italic}
.msg-text a{color:var(--accent-light);text-decoration:none;border-bottom:1px solid transparent;transition:border-color var(--transition)}
.msg-text a:hover{border-bottom-color:var(--accent-light)}
.msg-text code{background:var(--bg-code);padding:2px 7px;border-radius:5px;font-size:13px;font-family:var(--mono);color:var(--text)}
.msg-text pre{background:var(--bg-code);border-radius:var(--radius-md);margin:14px 0;overflow:hidden;border:1px solid var(--border-subtle)}
.msg-text pre .code-head{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:var(--bg-code-header);border-bottom:1px solid var(--border-subtle);font-size:12px;color:var(--text-faint);font-family:var(--font)}
.msg-text pre .code-head .btn-cp{background:none;border:1px solid var(--border);color:var(--text-faint);padding:2px 10px;border-radius:5px;font-size:11px;cursor:pointer;font-family:var(--font);transition:all var(--transition)}
.msg-text pre .code-head .btn-cp:hover{color:var(--text);border-color:var(--text-muted)}
.msg-text pre code{display:block;padding:14px 16px;overflow-x:auto;font-family:var(--mono);font-size:13px;line-height:1.55;color:var(--text-secondary);background:none;border-radius:0}
.msg-text blockquote{border-left:3px solid var(--accent-dim);padding:2px 0 2px 16px;margin:10px 0;color:var(--text-secondary)}
.msg-text ul,.msg-text ol{margin:8px 0;padding-left:22px}
.msg-text li{margin-bottom:4px}
.msg-text h1,.msg-text h2,.msg-text h3{margin:18px 0 8px;font-weight:600;letter-spacing:-.02em;color:var(--text);font-family:var(--font)}
.msg-text h1{font-size:20px}
.msg-text h2{font-size:17px}
.msg-text h3{font-size:15px}
.msg-text hr{border:none;border-top:1px solid var(--border);margin:18px 0}
.msg-text table{border-collapse:collapse;margin:12px 0;width:100%;font-size:14px;font-family:var(--font)}
.msg-text th,.msg-text td{border:1px solid var(--border);padding:8px 12px;text-align:left}
.msg-text th{background:var(--bg-input);font-weight:600;font-size:13px}

/* Cursor blink */
.cursor{display:inline-block;width:2px;height:1em;background:var(--accent);margin-left:2px;vertical-align:text-bottom;animation:blink .6s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* Thinking */
.thinking{padding:14px 0;display:none;animation:fadeUp .3s ease}
.thinking.active{display:block}
.thinking-inner{display:flex;gap:12px;align-items:center}
.thinking-dots{display:flex;gap:5px}
.thinking-dots span{width:6px;height:6px;background:var(--text-muted);border-radius:50%;animation:think 1.5s infinite ease-in-out}
.thinking-dots span:nth-child(1){animation-delay:0s}
.thinking-dots span:nth-child(2){animation-delay:.2s}
.thinking-dots span:nth-child(3){animation-delay:.4s}
@keyframes think{0%,80%,100%{transform:scale(.6);opacity:.3}40%{transform:scale(1);opacity:1}}
.thinking-label{font-size:13px;color:var(--text-muted);font-family:var(--font-serif);font-style:italic}

/* File download card (Melhoria 4) */
.file-download{background:var(--bg-input);border:1px solid var(--border);border-radius:8px;padding:8px 14px;margin-top:8px;display:inline-flex;align-items:center;gap:8px;font-size:13px}
.file-download i{color:var(--text-muted)}

/* Tool call / result blocks */
.tool-call{background:#1a1917;border-left:2px solid var(--accent);border-radius:6px;padding:7px 12px;margin:4px 0;font-family:'Courier New',monospace;font-size:12px;color:var(--text-muted);animation:fadeUp .2s ease}
.tool-call .tool-icon{color:var(--accent);margin-right:6px}
.tool-call .tool-name{color:#e8a87c;font-weight:600;margin-right:8px}
.tool-call .tool-input{margin-top:4px;padding-left:16px;opacity:.75;word-break:break-all}
.tool-call .tool-key{color:#7dd3fc}
.tool-call .tool-val{color:#a5f3a5}
.tool-result{background:#141412;border-left:2px solid #4a5568;border-radius:6px;padding:5px 12px;margin:2px 0 6px 0;font-family:'Courier New',monospace;font-size:11px;color:#6b7280;animation:fadeUp .2s ease;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%}
.tool-result .tool-icon{margin-right:6px;color:#4a5568}
.file-download a{color:var(--accent);font-weight:500;text-decoration:none}
.file-download a:hover{color:var(--accent-light)}

/* ═══════ INPUT ═══════ */
.input-area{padding:12px 24px 18px;display:flex;justify-content:center;flex-shrink:0}
.input-outer{max-width:720px;width:100%}

.upload-bar{display:none;padding:8px 14px;background:var(--bg-input);border:1px solid var(--border);border-bottom:none;border-radius:var(--radius-lg) var(--radius-lg) 0 0;align-items:center;gap:8px;font-size:13px;color:var(--text-secondary);animation:fadeUp .2s ease}
.upload-bar.active{display:flex}
.upload-bar .fname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.upload-bar .btn-x{background:none;border:none;color:var(--text-faint);cursor:pointer;font-size:14px;transition:color var(--transition)}
.upload-bar .btn-x:hover{color:#ef4444}

/* Quick prompt buttons (Melhoria 3) */
.quick-btns{display:flex;gap:6px;flex-wrap:wrap;padding:8px 0 4px}
.quick-btn{background:rgba(255,255,255,0.55);border:1px solid rgba(0,0,0,0.16);border-radius:20px;padding:7px 18px;font-size:12px;font-weight:500;color:var(--text);cursor:pointer;transition:all var(--transition);font-family:var(--font);white-space:nowrap;box-shadow:0 1px 3px rgba(0,0,0,.06);letter-spacing:.01em;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.quick-btn:hover{background:rgba(255,255,255,0.78);border-color:rgba(175,135,108,0.5);transform:translateY(-1px);box-shadow:0 3px 8px rgba(0,0,0,.1)}.quick-btn:active{transform:translateY(0);box-shadow:0 1px 2px rgba(0,0,0,.06)}

.input-shell{display:flex;align-items:flex-end;background:rgba(255,255,255,0.62);border:1px solid rgba(0,0,0,0.18);border-radius:28px;padding:4px 4px 4px 16px;transition:border-color .2s,box-shadow .2s;backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);box-shadow:0 2px 12px rgba(0,0,0,.07)}
.upload-bar.active+.quick-btns+.input-shell,.upload-bar.active~.input-shell{border-radius:0 0 28px 28px;border-top:none}
.input-shell:focus-within{border-color:rgba(201,100,66,0.45);box-shadow:0 0 0 2px rgba(201,100,66,.1),0 2px 12px rgba(0,0,0,.07)}

textarea#msgInput{flex:1;background:none;border:none;color:var(--text);font-size:15px;font-family:var(--font);resize:none;outline:none;line-height:1.5;max-height:180px;min-height:24px;padding:10px 0;letter-spacing:-.005em}
textarea#msgInput::placeholder{color:var(--text-faint);transition:color var(--transition)}
textarea#msgInput:focus::placeholder{color:var(--text-muted)}

.input-btns{display:flex;align-items:center;gap:2px;padding-bottom:6px}
.btn-attach{width:34px;height:34px;border-radius:50%;background:none;border:none;color:var(--text-faint);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all var(--transition)}
.btn-attach:hover{color:var(--text);background:var(--bg-hover)}

.btn-send{width:36px;height:36px;border-radius:50%;background:var(--text);border:none;color:#f5f0e8;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;transition:all var(--transition)}
.btn-send:hover{opacity:.85;transform:scale(1.05)}
.btn-send:active{transform:scale(.95)}
.btn-send:disabled{opacity:.15;cursor:not-allowed;transform:none}

/* Cancel button (Melhoria 2) */
.btn-cancel{width:34px;height:34px;border-radius:50%;background:var(--accent);border:none;color:#fff;cursor:pointer;display:none;align-items:center;justify-content:center;font-size:13px;transition:all var(--transition)}
.btn-cancel:hover{opacity:.85;transform:scale(1.05)}
.btn-cancel:active{transform:scale(.95)}

.input-hint{text-align:center;padding-top:8px;font-size:11px;color:var(--text-faint);letter-spacing:.01em;font-family:var(--font)}

input#fileInput{display:none}

/* ═══════ SKILLS PANEL ═══════ */
#skillsPanel{position:fixed;top:0;right:0;bottom:0;width:340px;background:var(--bg-sidebar);border-left:1px solid var(--border-subtle);z-index:200;transform:translateX(100%);transition:transform .25s ease;display:flex;flex-direction:column}
#skillsPanel.open{transform:translateX(0)}
.skills-header{padding:16px 18px;border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;justify-content:space-between}
.skills-header h3{font-size:15px;font-weight:600;color:var(--text)}
.skills-close{background:none;border:none;color:var(--text-faint);font-size:18px;cursor:pointer;padding:4px;transition:color var(--transition)}
.skills-close:hover{color:var(--text)}
.skills-list{flex:1;overflow-y:auto;padding:12px}
.skills-list::-webkit-scrollbar{width:4px}
.skills-list::-webkit-scrollbar-thumb{background:var(--scrollbar);border-radius:2px}
.skill-card{padding:12px 14px;border-radius:var(--radius-sm);border:1px solid var(--border-subtle);margin-bottom:8px;cursor:pointer;transition:all var(--transition);background:var(--bg)}
.skill-card:hover{border-color:var(--border);background:var(--bg-hover)}
.skill-card.active{border-color:var(--accent);background:rgba(201,100,66,.06)}
.skill-card-top{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.skill-icon{font-size:18px;flex-shrink:0}
.skill-name{font-size:13px;font-weight:600;color:var(--text)}
.skill-badge{margin-left:auto;font-size:10px;font-weight:600;color:var(--accent);background:rgba(201,100,66,.12);padding:2px 7px;border-radius:4px;border:1px solid rgba(201,100,66,.2);flex-shrink:0}
.skill-desc{font-size:12px;color:var(--text-secondary);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.skills-footer{padding:14px 18px;border-top:1px solid var(--border-subtle)}
.btn-deactivate{width:100%;background:none;border:1px solid var(--border);color:var(--text-muted);border-radius:8px;padding:9px;font-size:13px;cursor:pointer;font-family:var(--font);transition:all var(--transition)}
.btn-deactivate:hover{border-color:#ef4444;color:#ef4444}
.skills-overlay{position:fixed;inset:0;z-index:199;display:none}
.skills-overlay.open{display:block}

/* Active skill badge in header */
.active-skill-tag{font-size:11px;color:var(--accent);background:rgba(201,100,66,.1);border:1px solid rgba(201,100,66,.2);padding:3px 9px;border-radius:5px;cursor:pointer;transition:all var(--transition);display:none;align-items:center;gap:5px}
.active-skill-tag.show{display:flex}
.active-skill-tag:hover{background:rgba(201,100,66,.18)}

@media(max-width:768px){
  #skillsPanel{width:100%;max-width:340px}
}

/* ═══════ ERROR MODAL (Melhoria 8) ═══════ */
#errorModal{position:fixed;inset:0;z-index:999;background:rgba(61,31,14,.45);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);display:none;align-items:center;justify-content:center}
#errorModal.open{display:flex}
.error-card{background:var(--bg-sidebar);border-radius:12px;padding:24px;max-width:360px;width:90%;text-align:center;border:1px solid var(--border)}
.error-card h3{font-size:16px;font-weight:600;margin-bottom:10px;color:var(--text)}
.error-card p{font-size:14px;color:var(--text-secondary);line-height:1.6;margin-bottom:20px}
.error-card button{background:var(--accent);color:#fff;border:none;border-radius:8px;padding:10px 28px;font-size:14px;font-weight:500;cursor:pointer;font-family:var(--font);transition:opacity var(--transition)}
.error-card button:hover{opacity:.85}

/* ═══════ ANIMATIONS ═══════ */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

@media(max-width:768px){
  .header{padding:0 12px;z-index:10;position:relative}
  .header-right .btn-skills span,.header-right .btn-skills{font-size:11px}
  .header-right .pro-badge{display:none}
  .messages-inner{padding:16px 12px 8px}
  .input-area{padding:10px 12px;padding-bottom:calc(14px + env(safe-area-inset-bottom, 0px))}
  .quick-btns{overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px;-webkit-overflow-scrolling:touch}
  .quick-btns::-webkit-scrollbar{display:none}
  .input-hint{display:none}
}
/* iOS safe areas */
@supports(padding: env(safe-area-inset-bottom)){
  .input-area{padding-bottom:calc(14px + env(safe-area-inset-bottom))}
  @media(max-width:768px){
    .input-area{padding-bottom:calc(10px + env(safe-area-inset-bottom))}
    .header{padding-top:env(safe-area-inset-top, 0px)}
  }
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>
<div id="app">

  <!-- Main -->
  <main class="main">
    <div class="header">
      <div class="header-left">
        <div class="model-badge">

<script>
const token = localStorage.getItem('claude_token');
if (!token) window.location.href = '/';

// ── API Config ──
const API_CONFIG = {
  endpoint: '/webhook/system-code-chat',
  headers: { 'Content-Type': 'application/json' },
  messageField: 'message',
  responseField: 'response'
};

// ── Infinity SVG ──
const INFINITY_SVG = '<img src="/logo_nobg.png" alt="System Code" style="width:38px;height:38px;border-radius:50%;object-fit:contain">';

// Elements
const $ = id => document.getElementById(id);
const messagesEl = $('messages');
const wrapEl = $('messagesWrap');
const msgInput = $('msgInput');
const btnSend = $('btnSend');
const btnCancel = $('btnCancel');
const dot = $('dot');
const usageBar = $('usageBar');

let ws, currentStreamEl = null, streamText = '', isWaiting = false, userAtBottom = true;
let chatHistory = [];
// welcomeEl é buscado dinamicamente para evitar referência stale após resetChat()

// Token usage accumulators (Melhoria 6)
let totalInputTokens = 0, totalOutputTokens = 0, totalCostUsd = 0;

// ── Smart auto-scroll ──
wrapEl.addEventListener('scroll', () => {
  const { scrollTop, scrollHeight, clientHeight } = wrapEl;
  userAtBottom = scrollHeight - scrollTop - clientHeight < 80;
});
function scrollDown() {
  if (userAtBottom) requestAnimationFrame(() => wrapEl.scrollTop = wrapEl.scrollHeight);
}

// ── WebSocket ──
function connect() {
  const p = location.protocol === 'https:' ? 'wss' : 'ws';
  ws = new WebSocket(`${p}://${location.host}?token=${token}`);
  ws.onopen = () => { dot.className = 'dot online'; };
  ws.onmessage = e => handleMsg(JSON.parse(e.data));
  ws.onclose = e => {
    dot.className = 'dot offline';
    if (e.code === 4001) { localStorage.removeItem('claude_token'); location.href = '/'; return; }
    if (e.code === 4002) return; // max sessions, already handled
    setTimeout(connect, 3000);
  };
  ws.onerror = () => dot.className = 'dot offline';
}

function handleMsg(m) {
  if (m.type === 'status') dot.className = 'dot ' + (m.status === 'ready' ? 'online' : 'loading');

  if (m.type === 'typing') showThinking(m.active);

  // Melhoria 1: Queue position feedback
  if (m.type === 'queued') {
    if (thinkEl) thinkEl.remove();
    thinkEl = document.createElement('div');
    thinkEl.className = 'thinking active';
    thinkEl.innerHTML = `<div class="thinking-inner"><div class="msg-avatar ai">${INFINITY_SVG}</div><div class="thinking-label">⏳ Aguardando — posição ${m.position} na fila</div></div>`;
    messagesEl.appendChild(thinkEl);
    scrollDown();
  }

  if (m.type === 'queue_start') {
    if (thinkEl) {
      thinkEl.innerHTML = `<div class="thinking-inner"><div class="msg-avatar ai">${INFINITY_SVG}</div><div class="thinking-dots"><span></span><span></span><span></span></div><div class="thinking-label">Pensando...</div></div>`;
    }
  }

  if (m.type === 'tool_use') {
    const inputStr = m.input && Object.keys(m.input).length
      ? Object.entries(m.input).map(([k,v]) => `<span class="tool-key">${esc(k)}</span>: <span class="tool-val">${esc(String(v).substring(0, 120))}</span>`).join('  ')
      : '';
    const toolEl = document.createElement('div');
    toolEl.className = 'tool-call';
    toolEl.innerHTML = `<span class="tool-icon">⚙</span> <span class="tool-name">${esc(m.tool)}</span>${inputStr ? '<div class="tool-input">' + inputStr + '</div>' : ''}`;
    messagesEl.appendChild(toolEl);
    scrollDown();
  }

  if (m.type === 'tool_result') {
    const resEl = document.createElement('div');
    resEl.className = 'tool-result';
    resEl.innerHTML = `<span class="tool-icon">↩</span> ${esc(m.content)}`;
    messagesEl.appendChild(resEl);
    scrollDown();
  }

  if (m.type === 'stream') {
    hideThinking();
    if (!currentStreamEl) {
      currentStreamEl = addMsg('ai', '', 'System Code');
      streamText = '';
    }
    streamText += m.content;
    const el = currentStreamEl.querySelector('.msg-text');
    renderMd(el, streamText, true);
    scrollDown();
  }

  if (m.type === 'response_end') {
    if (currentStreamEl) {
      const el = currentStreamEl.querySelector('.msg-text');
      renderMd(el, streamText, false);
      chatHistory.push({ role: 'assistant', content: streamText });
    }
    currentStreamEl = null; streamText = '';
    isWaiting = false; hideThinking(); updateBtn();
  }

  if (m.type === 'telegram_message') {
    addMsg('tg', m.content, m.user || 'Telegram', 'telegram');
    isWaiting = true; updateBtn();
  }

  // Melhoria 2: Cancelled
  if (m.type === 'cancelled') {
    hideThinking();
    currentStreamEl = null; streamText = '';
    isWaiting = false; updateBtn();
    addMsg('ai', '⛔ Resposta cancelada.', 'System Code');
  }

  // Melhoria 4: File created
  if (m.type === 'file_created') {
    const fileEl = document.createElement('div');
    fileEl.className = 'file-download';
    fileEl.innerHTML = `<i class="fas fa-file-arrow-down"></i> <a href="/api/download/${encodeURIComponent(m.filename)}?token=${encodeURIComponent(token)}" download="${esc(m.filename)}">${esc(m.filename)}</a>`;
    if (currentStreamEl) {
      currentStreamEl.querySelector('.msg-body').appendChild(fileEl);
    } else {
      messagesEl.appendChild(fileEl);
    }
    scrollDown();
  }

  // Melhoria 6: Token usage
  if (m.type === 'usage') {
    totalInputTokens += m.input_tokens || 0;
    totalOutputTokens += m.output_tokens || 0;
    totalCostUsd += parseFloat(m.cost_usd || 0);
    usageBar.style.display = 'flex';
    usageBar.innerHTML = `<span title="Tokens enviados">↑ ${m.input_tokens.toLocaleString('pt-BR')}</span><span title="Tokens recebidos">↓ ${m.output_tokens.toLocaleString('pt-BR')}</span><span title="Custo estimado desta resposta">~$${m.cost_usd}</span><span title="Custo acumulado da sessao" style="color:var(--text-faint)">total ~$${totalCostUsd.toFixed(5)}</span>`;
  }

  // Melhoria 7: Watchdog restart
  if (m.type === 'watchdog_restart') {
    hideThinking();
    currentStreamEl = null; streamText = '';
    isWaiting = false; updateBtn();
    addMsg('ai', '⚠️ Processo travado detectado. Reiniciando automaticamente... Reenvie sua mensagem.', 'System Code');
  }

  // Melhoria 8: Max sessions error
  if (m.type === 'error' && m.code === 'max_sessions') {
    $('errorModalMsg').textContent = m.message;
    $('errorModal').classList.add('open');
  }
}

// ── Thinking indicator ──
let thinkEl = null;
function showThinking(active) {
  if (!active) { hideThinking(); return; }
  if (thinkEl) return;
  thinkEl = document.createElement('div');
  thinkEl.className = 'thinking active';
  thinkEl.innerHTML = `<div class="thinking-inner"><div class="msg-avatar ai">${INFINITY_SVG}</div><div class="thinking-dots"><span></span><span></span><span></span></div><div class="thinking-label">Pensando...</div></div>`;
  messagesEl.appendChild(thinkEl);
  scrollDown();
}
function hideThinking() { if (thinkEl) { thinkEl.remove(); thinkEl = null; } }

// ── Add message ──
function addMsg(type, content, name, source) {
  const welcomeEl = $('welcome'); if (welcomeEl) welcomeEl.style.display = 'none';
  const div = document.createElement('div');
  div.className = 'message';

  const side = type === 'human' ? 'user' : '';
  const avInner = type === 'ai' ? INFINITY_SVG : type === 'tg' ? 'T' : (name?.charAt(0)?.toUpperCase() || 'V');
  const avClass = type === 'ai' ? 'ai' : type === 'tg' ? 'tg' : 'human';
  const displayName = type === 'ai' ? 'System Code' : name || 'Voce';
  const time = new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
  const srcBadge = source === 'telegram' ? '<span class="msg-source">Telegram</span>' : '';

  const actions = type === 'ai' ? `
    <div class="msg-actions">
      <button class="msg-act" onclick="copyMsg(this)" title="Copiar"><i class="fas fa-copy"></i></button>
      <button class="msg-act" onclick="reactMsg(this,'up')" title="Bom"><i class="fas fa-thumbs-up"></i></button>
      <button class="msg-act" onclick="reactMsg(this,'down')" title="Ruim"><i class="fas fa-thumbs-down"></i></button>
    </div>` : '';

  div.innerHTML = `<div class="msg-row ${side}"><div class="msg-avatar ${avClass}">${avInner}</div><div class="msg-body"><div class="msg-meta"><span class="msg-name">${esc(displayName)}</span>${srcBadge}<span class="msg-time">${time}</span></div><div class="msg-text"></div>${actions}</div></div>`;

  const textEl = div.querySelector('.msg-text');
  if (type === 'human' || type === 'tg') {
    textEl.textContent = content;
  } else {
    renderMd(textEl, content, false);
  }

  messagesEl.appendChild(div);
  scrollDown();
  return div;
}

// ── Copy message ──
window.copyMsg = function(btn) {
  const text = btn.closest('.msg-body').querySelector('.msg-text').innerText;
  navigator.clipboard.writeText(text).then(() => {
    btn.classList.add('copied');
    btn.innerHTML = '<i class="fas fa-check"></i>';
    setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = '<i class="fas fa-copy"></i>'; }, 2000);
  });
};

window.reactMsg = function(btn, type) {
  btn.style.color = type === 'up' ? 'var(--green)' : 'var(--accent)';
  setTimeout(() => btn.style.color = '', 1500);
};

// ── Markdown renderer ──
function renderMd(el, text, streaming) {
  if (!text) { el.innerHTML = streaming ? '<span class="cursor"></span>' : ''; return; }
  let h = text;

  h = h.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    const l = lang || 'code';
    return `<pre><div class="code-head"><span>${esc(l)}</span><button class="btn-cp" onclick="cpCode(this)">Copiar</button></div><code>${escCode(code.trimEnd())}</code></pre>`;
  });
  h = h.replace(/(?<!<code>)`([^`\n]+)`(?!<\/code>)/g, '<code>$1</code>');
  h = h.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  h = h.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  h = h.replace(/^# (.+)$/gm, '<h1>$1</h1>');
  h = h.replace(/\*\*\*(.+?)\*\*\*/g, '<strong><em>$1</em></strong>');
  h = h.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  h = h.replace(/(?<!\*)\*([^*\n]+)\*(?!\*)/g, '<em>$1</em>');
  h = h.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  h = h.replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>');
  h = h.replace(/^[-*] (.+)$/gm, '<li>$1</li>');
  h = h.replace(/((?:<li>[\s\S]*?<\/li>\s*)+)/g, m => '<ul>' + m + '</ul>');
  h = h.replace(/^---$/gm, '<hr>');
  h = h.split('\n\n').map(p => {
    p = p.trim(); if (!p) return '';
    if (/^<(h[1-3]|pre|ul|ol|blockquote|hr|table)/.test(p)) return p;
    return `<p>${p.replace(/\n/g, '<br>')}</p>`;
  }).join('');

  if (streaming) h += '<span class="cursor"></span>';
  el.innerHTML = h;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escCode(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }
window.cpCode = function(btn) {
  const code = btn.closest('pre').querySelector('code').textContent;
  navigator.clipboard.writeText(code).then(() => {
    btn.textContent = 'Copiado!'; btn.style.color = 'var(--green)';
    setTimeout(() => { btn.textContent = 'Copiar'; btn.style.color = ''; }, 2000);
  });
};

// ── Send ──
function send() {
  const text = msgInput.value.trim();
  if (!text || isWaiting) return;
  const welcomeEl = $('welcome'); if (welcomeEl) welcomeEl.style.display = 'none';
  addMsg('human', text, 'Voce');
  chatHistory.push({ role: 'user', content: text });
  msgInput.value = ''; resize();
  isWaiting = true; updateBtn();
  currentStreamEl = null; streamText = '';

  if (ws && ws.readyState === 1) {
    ws.send(JSON.stringify({ type: 'message', content: text }));
  } else {
    sendViaAPI(text);
  }
}

async function sendViaAPI(text) {
  hideThinking();
  addMsg('ai', 'Conexao perdida. Reconectando...', 'System Code');
  connect(); // try to reconnect
  isWaiting = false; updateBtn();
}

function updateBtn() {
  if (isWaiting) {
    btnCancel.style.display = 'flex';
    btnSend.style.display = 'none';
    $('quickBtns').style.display = 'none';
  } else {
    btnCancel.style.display = 'none';
    btnSend.style.display = 'flex';
    $('quickBtns').style.display = 'flex';
  }
  btnSend.disabled = isWaiting || !msgInput.value.trim();
}

// Melhoria 2: Cancel button
btnCancel.addEventListener('click', async () => {
  await fetch('/api/cancel', { method: 'POST', headers: { Authorization: 'Bearer ' + token } }).catch(() => {});
});

btnSend.addEventListener('click', send);
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
msgInput.addEventListener('input', () => { resize(); updateBtn(); });

function resize() {
  msgInput.style.height = 'auto';
  msgInput.style.height = Math.min(msgInput.scrollHeight, 180) + 'px';
}

// Melhoria 3: Quick prompt buttons
document.querySelectorAll('.quick-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    msgInput.value = btn.dataset.prompt;
    msgInput.focus();
    msgInput.setSelectionRange(msgInput.value.length, msgInput.value.length);
    resize();
    updateBtn();
  });
});

// ── File upload ──
$('btnAttach').addEventListener('click', () => $('fileInput').click());
$('fileInput').addEventListener('change', async function() {
  const f = this.files[0]; if (!f) return;
  $('uploadName').textContent = f.name;
  $('uploadBar').classList.add('active');
  const fd = new FormData(); fd.append('file', f);
  try {
    const r = await fetch('/api/upload', { method: 'POST', headers: { Authorization: 'Bearer ' + token }, body: fd });
    const d = await r.json();
    if (d.ok) {
      addMsg('human', `[Arquivo: ${d.name}]`, 'Voce');
      if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: 'file', path: d.path, name: d.name }));
      isWaiting = true; updateBtn();
    }
  } catch {}
  $('uploadBar').classList.remove('active'); this.value = '';
});
$('btnCancelUpload').addEventListener('click', () => { $('uploadBar').classList.remove('active'); $('fileInput').value = ''; });

// ── Reset chat ──
const WELCOME_HTML = `<div class="welcome" id="welcome"><div class="welcome-icon"><img src="/logo_nobg.png" alt="System Code"></div><h2>Como posso ajudar?</h2><p>INTELIG&#xCA;NCIA INFINITA &bull; POSSIBILIDADES PREMIUM</p></div>`;

function resetChat() {
  fetch('/api/reset', { method: 'POST', headers: { Authorization: 'Bearer ' + token } }).catch(() => {});
  messagesEl.innerHTML = WELCOME_HTML;
  currentStreamEl = null; streamText = ''; isWaiting = false; chatHistory = [];
  totalInputTokens = 0; totalOutputTokens = 0; totalCostUsd = 0;
  usageBar.style.display = 'none';
  updateBtn();
}
$('btnNewChat').addEventListener('click', resetChat);

// ── Logout ──
$('btnLogout').addEventListener('click', () => { localStorage.removeItem('claude_token'); ws?.close(); location.href = '/'; });

// ── History ──
async function loadHistory() {
  try {
    const r = await fetch('/api/history', { headers: { Authorization: 'Bearer ' + token } });
    const d = await r.json();
    if (d.ok && d.messages.length) {
      const welcomeEl = $('welcome'); if (welcomeEl) welcomeEl.style.display = 'none';
      d.messages.forEach(m => {
        const type = m.role === 'user' ? (m.source === 'telegram' ? 'tg' : 'human') : 'ai';
        const name = m.role === 'user' ? (m.source === 'telegram' ? 'Telegram' : 'Voce') : 'System Code';
        addMsg(type, m.content, name, m.source);
        chatHistory.push({ role: m.role, content: m.content });
      });
    }
  } catch {}
}

// ── Skills (integração das skills clonadas) ──
const SKILL_ICONS = {
  'content-humanizer': '✍️',
  'landing-page-generator': '🌐',
  'paid-ads': '📢',
  'ad-creative': '🎨',
  'agent-designer': '🤖',
  'mcp-server-builder': '🔧',
  'campaign-analytics': '📊',
  'copywriting': '📝',
  'saas-metrics-coach': '💰',
};

let allSkills = [];
let activeSkillId = null;

async function loadSkillsList() {
  try {
    const r = await fetch('/api/skills', { headers: { Authorization: 'Bearer ' + token } });
    const d = await r.json();
    if (!d.ok) return;
    allSkills = d.skills;
    renderSkillsList();
  } catch {
    $('skillsList').innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-muted);font-size:13px">Erro ao carregar skills.</div>';
  }
}

function renderSkillsList() {
  const listEl = $('skillsList');
  if (!allSkills.length) {
    listEl.innerHTML = '<div style="text-align:center;padding:30px;color:var(--text-muted);font-size:13px">Nenhuma skill disponível.</div>';
    return;
  }
  listEl.innerHTML = allSkills.map(s => {
    const icon = SKILL_ICONS[s.id] || '⚡';
    const isActive = s.id === activeSkillId;
    return `<div class="skill-card${isActive ? ' active' : ''}" onclick="activateSkill('${esc(s.id)}','${esc(s.name)}')">
      <div class="skill-card-top">
        <span class="skill-icon">${icon}</span>
        <span class="skill-name">${esc(s.name)}</span>
        ${isActive ? '<span class="skill-badge">ATIVA</span>' : ''}
      </div>
      <div class="skill-desc">${esc(s.description)}</div>
    </div>`;
  }).join('');
}

async function activateSkill(skillId, skillName) {
  // Toggle off if already active
  if (activeSkillId === skillId) {
    await deactivateSkill();
    return;
  }
  try {
    const r = await fetch('/api/skills/activate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({ skillId })
    });
    const d = await r.json();
    if (!d.ok) return;
    activeSkillId = skillId;
    // Update header badge
    const icon = SKILL_ICONS[skillId] || '⚡';
    const tag = $('activeSkillTag');
    tag.innerHTML = `${icon} ${esc(skillName)} <i class="fas fa-xmark" style="font-size:9px;opacity:.7"></i>`;
    tag.classList.add('show');
    // Show confirmation in chat
    addMsg('ai', `✅ Skill **${skillName}** ativada. Suas próximas mensagens usarão as instruções desta skill.`, 'System Code');
    renderSkillsList();
    closeSkillsPanel();
  } catch {}
}

async function deactivateSkill() {
  try {
    await fetch('/api/skills/activate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({ skillId: null })
    });
    activeSkillId = null;
    $('activeSkillTag').classList.remove('show');
    $('activeSkillTag').innerHTML = '';
    renderSkillsList();
    addMsg('ai', '⭕ Skill desativada. Voltando ao modo padrão.', 'System Code');
    closeSkillsPanel();
  } catch {}
}

function openSkillsPanel() {
  $('skillsPanel').classList.add('open');
  $('skillsOverlay').classList.add('open');
  if (!allSkills.length) loadSkillsList();
}

function closeSkillsPanel() {
  $('skillsPanel').classList.remove('open');
  $('skillsOverlay').classList.remove('open');
}

// ── Init ──
connect();
loadSkillsList();
msgInput.focus();
</script>
<script>if("serviceWorker" in navigator){navigator.serviceWorker.register("/service-worker.js")}</script>
</body>
</html>
